# agent-rulez-sample.yaml
# Deployed to .claude/hooks.yaml by /codebase-wizard-setup.
# Provides security enforcement (block rules) and session capture (run rule).
# Activated with: rulez install

version: "1.0"
settings:
  debug_logs: false
  log_level: info
  fail_open: true
  script_timeout: 5
rules:
  - name: block-force-push
    description: Prevent force-pushing to main or master branches
    matchers:
      tools: [Bash]
      command_match: "git push.*(--force|-f).*(main|master)"
    actions:
      block: true
    metadata:
      priority: 100
      enabled: true
  - name: block-recursive-delete
    description: Prevent rm -rf on non-temporary directories
    matchers:
      tools: [Bash]
      command_match: "rm\\s+-rf?\\s+(?!\\/tmp|\\.code-wizard\\/tmp)"
    actions:
      block: true
    metadata:
      priority: 90
      enabled: true
  - name: capture-session
    description: Capture tool call events to session JSON for /codebase-wizard-export
    matchers:
      tools: [Read, Grep, Glob, Write]
    actions:
      run: .code-wizard/scripts/capture-session.sh
    metadata:
      priority: 10
      enabled: true
